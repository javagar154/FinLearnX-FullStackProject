spring.application.name=finlearnx-backend
server.port=${PORT:8081}

# ─── Supabase PostgreSQL ─────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.username=postgres.fwdjmecrkablphniiwvf
spring.datasource.password=Javagar@555333
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── HikariCP Connection Pool ────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.data-source-properties.sslmode=require

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ─── JWT ─────────────────────────────────────────────────────────────────────
jwt.secret=finlearnx_super_secret_key_2024_must_be_at_least_256_bits_long
jwt.expiration=86400000

# ─── CORS ────────────────────────────────────────────────────────────────────
