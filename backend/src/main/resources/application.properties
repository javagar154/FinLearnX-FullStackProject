# ─── Application ─────────────────────────────────────────────────────────────
spring.application.name=finlearnx-backend
server.port=8081

# ─── Supabase PostgreSQL (Session Pooler — port 5432) ────────────────────────
# SSL is REQUIRED for all Supabase connections.
# sslmode=require tells the JDBC driver to use SSL without certificate validation.
spring.datasource.url=jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.username=postgres.fwdjmecrkablphniiwvf
spring.datasource.password=Javagar@555333
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── HikariCP Connection Pool ────────────────────────────────────────────────
# Supabase Session Pooler supports up to 200 concurrent connections.
# Keep pool small to avoid exhausting the pooler limit.
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
# keepalive keeps idle connections alive through the Supabase pooler
spring.datasource.hikari.keepalive-time=60000
# Validate connection on borrow — critical for pooled/cloud databases
spring.datasource.hikari.connection-test-query=SELECT 1
# Pass SSL mode through HikariCP as well
spring.datasource.hikari.data-source-properties.sslmode=require

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# Disable open-in-view to prevent connection leaks
spring.jpa.open-in-view=false
# Supabase uses UTC — align Hibernate timezone
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ─── JWT ─────────────────────────────────────────────────────────────────────
jwt.secret=finlearnx_super_secret_key_2024_must_be_at_least_256_bits_long_for_hs256
jwt.expiration=86400000

# ─── CORS ────────────────────────────────────────────────────────────────────
cors.allowed-origins=http://localhost:3000,http://localhost:3001

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.finlearnx=DEBUG
logging.level.org.springframework.security=WARN
logging.level.com.zaxxer.hikari=INFO
