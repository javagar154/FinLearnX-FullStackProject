version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: finlearnx-postgres
    environment:
      POSTGRES_DB: finlearnx
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: finlearnx123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - finlearnx-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finlearnx-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/finlearnx
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: finlearnx123
      JWT_SECRET: finlearnx_super_secret_key_2024_must_be_at_least_256_bits_long_for_hs256
      JWT_EXPIRATION: 86400000
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - finlearnx-network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finlearnx-frontend
    environment:
      REACT_APP_API_URL: http://localhost:8080/api
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - finlearnx-network

volumes:
  postgres_data:

networks:
  finlearnx-network:
    driver: bridge
